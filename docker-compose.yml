version: "3.8"
services:
  postgres:
    image: postgres:16
    container_name: market-postgres
    environment:
      POSTGRES_DB: market
      POSTGRES_USER: market_user
      POSTGRES_PASSWORD: market_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: